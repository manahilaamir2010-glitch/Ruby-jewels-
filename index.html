<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ruby | Fine Jewelry</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Montserrat:wght@300;400&display=swap" rel="stylesheet">
    <style>
        :root { --wine-red: #722F37; --gold: #C5A059; --cream: #F9F7F2; }
        body { margin: 0; font-family: 'Montserrat', sans-serif; background-color: var(--cream); }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 20px 5%; background: white; }
        .logo { font-family: 'Playfair Display', serif; font-size: 1.8rem; color: var(--wine-red); letter-spacing: 3px; }
        .hero { height: 60vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white;
                background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('IMG_1646.jpeg'); /* Using your photo! */
                background-size: cover; background-position: center; }
        .section-title { text-align: center; padding: 60px 0 20px; font-family: 'Playfair Display', serif; color: var(--wine-red); }
        .product-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; padding: 0 5% 50px; }
        .product-card { background: white; padding: 15px; text-align: center; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .product-card img { width: 100%; height: 250px; object-fit: cover; border-radius: 5px; margin-bottom: 15px; }
        .btn { display: inline-block; padding: 10px 25px; background: var(--wine-red); color: white; text-decoration: none; border-radius: 4px; }
    </style>
</head>
<body>
    <nav><div class="logo">RUBY</div></nav>
    <section class="hero">
        <div>
            <h1 style="font-family: 'Playfair Display'; font-size: 3rem;">Timeless Elegance</h1>
            <p>Handcrafted brilliance for the modern soul.</p>
        </div>
    </section>
    <h2 class="section-title">The Signature Collection</h2>
    <div class="product-grid">
        <div class="product-card">
            <img src="IMG_1647.jpeg">
            <h3>Rose Gold Series</h3>
            <p style="color: var(--gold); font-weight: bold;">Coming Soon</p>
        </div>
        <div class="product-card">
            <img src="IMG_1648.jpeg">
            <h3>Diamond Accents</h3>
            <p style="color: var(--gold); font-weight: bold;">Coming Soon</p>
        </div>
        <div class="product-card">
            <img src="IMG_1689.jpeg">
            <h3>The Ruby Collection</h3>
            <p style="color: var(--gold); font-weight: bold;">Coming Soon</p>
        </div>
    </div>
    <footer style="text-align: center; padding: 40px; background: var(--wine-red); color: white;">RUBY FINE JEWELRY &copy; 2026</footer>
</body>
</html>
