<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BOXIQUE | Curated Gift Boxes</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        :root { 
            --boxique-gold: #D4AF37; /* A refined gold based on your logo */
            --soft-white: #FCFAFA; 
            --text-dark: #333;
            --elegant-font: 'DM Serif Display', serif;
            --clean-font: 'Montserrat', sans-serif;
        }
        
        body { margin: 0; font-family: var(--clean-font); background-color: var(--soft-white); color: var(--text-dark); }
        
        /* Navigation (Logo Bar) */
        nav { display: flex; justify-content: center; align-items: center; padding: 40px 5%; background: white; }
        
        /* To create the 'B O X I Q U E' centered elegant text based on the logo image_6.png */
        .brand-text { font-family: var(--elegant-font); font-size: 2.8rem; color: var(--boxique-gold); text-align: center; letter-spacing: 5px; text-transform: uppercase; }

        /* The 'R' in a circle (Registered Trademark) */
        .trademark { vertical-align: super; font-size: 1rem; color: #999; font-family: sans-serif; }

        /* Hero / Headline Section */
        .hero { 
            height: 45vh; display: flex; align-items: center; justify-content: center; text-align: center; color: white;
            /* Placeholder Background: you can replace this with your best Box image later */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.3)), url('IMG_1707.jpeg');
            background-size: cover; background-position: center; 
        }

        .hero h1 { font-family: var(--elegant-font); font-size: 4rem; margin-bottom: 10px; }
        .hero p { letter-spacing: 3px; font-size: 0.9rem; text-transform: uppercase; }

        /* Collection Title */
        .section-title { text-align: center; padding: 80px 0 30px; font-family: var(--elegant-font); font-size: 2.5rem; color: #111; position: relative;}
        
        /* Product Grid */
        .gift-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 50px; padding: 0 8% 120px; }
        
        /* Individual Gift Cards */
        .gift-card { background: white; border: 1px solid #eee; overflow: hidden; border-radius: 8px; transition: 0.4s; text-align: center; padding-bottom: 30px; position: relative; }
        .gift-card:hover { transform: translateY(-10px); box-shadow: 0 20px 40px rgba(0,0,0,0.08); }
        
        /* The Image */
        .image-box { width: 100%; height: 380px; overflow: hidden; }
        .gift-card img { width: 100%; height: 100%; object-fit: cover; }

        /* Details (Text and Price) */
        .gift-details { padding: 0 15px; }
        .gift-card h3 { font-family: var(--elegant-font); font-size: 1.6rem; margin: 30px 0 10px; color: #111; }
        .price { color: var(--boxique-gold); font-weight: 500; font-size: 1.3rem; margin-bottom: 20px;}
        
        /* Button style matching the minimal high-end feel */
        .shop-btn { display: inline-block; padding: 12px 30px; border: 2px solid var(--text-dark); color: var(--text-dark); text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 2px; font-weight: 500; transition: 0.3s;}
        .shop-btn:hover { background: var(--text-dark); color: white; }

        /* Footer */
        footer { background: white; color: var(--boxique-gold); text-align: center; padding: 80px 20px; font-size: 0.8rem; letter-spacing: 1px;}
        .footer-logo { font-family: var(--elegant-font); font-size: 1.8rem; color: var(--boxique-gold); margin-bottom: 20px; display: block; letter-spacing: 3px; text-transform: uppercase; }

    </style>
</head>
<body>

    <nav>
        <div class="brand-text">B O X I Q U E<span class="trademark">®</span></div>
    </nav>

    <section class="hero">
        <div>
            <h1>Curated Gifting, Perfectly Packaged.</h1>
            <p>Elevating Every Occasion</p>
        </div>
    </section>

    <h2 class="section-title">Explore The Collection</h2>

    <div class="gift-grid">
        <div class="gift-card">
            <div class="image-box"><img src="IMG_1705.jpeg"></div>
            <div class="gift-details">
                <h3>The Grand Celebration</h3>
                <p class="price">$195.00</p>
                <a href="#" class="shop-btn">View Details</a>
            </div>
        </div>

        <div class="gift-card">
            <div class="image-box"><img src="IMG_1706.jpeg"></div>
            <div class="gift-details">
                <h3>Golden Serenity Set</h3>
                <p class="price">$220.00</p>
                <a href="#" class="shop-btn">View Details</a>
            </div>
        </div>

        <div class="gift-card">
            <div class="image-box"><img src="IMG_1707.jpeg"></div>
            <div class="gift-details">
                <h3>Velvet & Pearl Keepsake</h3>
                <p class="price">$145.00</p>
                <a href="#" class="shop-btn">View Details</a>
            </div>
        </div>
    </div>

    <footer>
        <span class="footer-logo">BOXIQUE</span>
        Curated Gifting • Worldwide Shipping • &copy; 2026
    </footer>

</body>
</html>
